<!DOCTYPE html>
<html lang="en">
<head> 
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Loading Screen</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Bitcount+Prop+Double+Ink:wght@100..900&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Lobster&family=Playwrite+CU+Guides&family=Roboto:ital,wght@0,100..900;1,100..900&family=Source+Serif+4:ital,opsz,wght@0,8..60,200..900;1,8..60,200..900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Bitcount+Prop+Double+Ink:wght@100..900&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Lobster&family=Nunito:ital,wght@0,200..1000;1,200..1000&family=Playwrite+CU+Guides&family=Roboto:ital,wght@0,100..900;1,100..900&family=Source+Serif+4:ital,opsz,wght@0,8..60,200..900;1,8..60,200..900&display=swap" rel="stylesheet">
        <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Bitcount+Prop+Double+Ink:wght@100..900&family=Bitcount+Prop+Double:wght,ELSH@100..900,13.1&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Lobster&family=Luckiest+Guy&family=Nunito:ital,wght@0,200..1000;1,200..1000&family=Playwrite+CU+Guides&family=Roboto:ital,wght@0,100..900;1,100..900&family=Source+Serif+4:ital,opsz,wght@0,8..60,200..900;1,8..60,200..900&display=swap" rel="stylesheet">
    <script src="Java.js" defer></script>
</head>


<body> 

    <main>
        <section>
            <h2>Loading......</h2>
            
            <div id="animation-container" class="box">
                <div id="bar" class="bar animate__animated"></div>

                <div id="ball" class="ball"></div>
            </div>

            <div class="loading"></div>

            <p>Balance the ball</p>

            <div class="progress-container">
                <div id="progress-fill" class="progress-fill"></div>
            </div>
        
        </section>
    </main>

    <div id="start-overlay">
        <h1>Bunny's Mindful</h1>
        <h1>Tea Party</h1>
        <img src="stand.png" class="stand-img" width="150" alt="stand">
        <img src="cup.png" class="cup-img" width="300" alt="tea cup">
        <img src="eyeclose.png" class="eyeclose-img" width="250" alt="bunny eyes">
        <button id="click-button" class="cta-button">
            Start
        </button>
    </div>

    <footer>
    </footer>

</html>
